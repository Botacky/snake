<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      user-select: none;
    }
    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8088;
      margin-bottom: 10px;
    }
    #scoreboard {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: #888;
      align-items: center;
    }
    #scoreboard .val { color: #e0e0e0; font-weight: 600; }
    #mode-badge {
      font-size: 0.78rem;
      background: #1e1e3a;
      padding: 3px 10px;
      border-radius: 12px;
      color: #888;
      border: 1px solid #2a2a3e;
    }
    #canvas-wrap { position: relative; line-height: 0; }
    canvas {
      display: block;

    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      border-radius: 6px;

    }
    #overlay.translucent { background: rgba(15,15,26,0.88); }

    #overlay h2 { font-size: 1.6rem; color: #4ade80; text-shadow: 0 0 16px #4ade8066; }
    #overlay .subtitle { font-size: 0.88rem; color: #888; text-align: center; }

    .mode-cards { display: flex; gap: 10px; width: 100%; }

    .mode-card .mn { font-size: 0.95rem; font-weight: 700; color: #ccc; margin-bottom: 4px; }

    .btn-row { display: flex; gap: 10px; align-items: center; }
    .btn-primary {

    .btn-ghost {

    }
    .btn-ghost:hover { color: #ccc; border-color: #4a4a6a; }

    #status-bar {

      display: flex;

    }
    .fx-chip {
      display: flex;
      align-items: center;

    @keyframes pop { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
    .fx-boost  { background:#3a2000; color:#fbbf24; border:1px solid #fbbf2444; }
    .fx-freeze { background:#00203a; color:#67e8f9; border:1px solid #67e8f944; }
    .fx-challenge { background:#3a1800; color:#f97316; border:1px solid #f9731644; }

    .go-score { font-size: 1.05rem; color: #ccc; }
    #hint { margin-top: 8px; font-size: 0.78rem; color: #3a3a5a; }

    /* ── Main menu ───────────────────────────────────────────────────────────── */
    #overlay.full     { position:fixed; inset:0; border-radius:0; z-index:10; background:#0f0f1a; }
    #overlay.full-dim { position:fixed; inset:0; border-radius:0; z-index:10; background:rgba(15,15,26,0.92); }
    .main-menu { display:flex; flex-direction:column; align-items:center; gap:20px; }
    .menu-item {
      font-size:1.7rem; font-weight:800; letter-spacing:0.2em;
      text-transform:uppercase; padding:4px 0; cursor:pointer;
      transition:transform 0.14s ease, color 0.12s;
      transform-origin:center; display:inline-block; user-select:none;
      white-space:nowrap;
    }
    .mi-play      { color:#4ade80; }
    .mi-secondary { color:#3a3a5e; }
    .mi-dim       { color:#222238; cursor:default; }
    .menu-item:hover  { transform:scale(1.3); }
    .mi-play:hover      { color:#86efac; }
    .mi-secondary:hover { color:#7070a0; }
    .mi-dim:hover       { color:#3a3a5e; }
    .play-group       { display:flex; flex-direction:column; align-items:center; }
    .sub-items {
      display:flex; flex-direction:column; align-items:center;
      gap:0; overflow:hidden; max-height:0; opacity:0;
      padding: 0 80px;
      transition:max-height 0.22s ease, opacity 0.18s ease;
    }
    .sub-items.open   { max-height:280px; opacity:1; }
    .sub-item {
      font-size:1.05rem; font-weight:700; letter-spacing:0.18em;
      text-transform:uppercase; color:#454565; cursor:pointer;
      padding:13px 0; transition:transform 0.14s ease, color 0.12s;
      display:inline-block; user-select:none; white-space:nowrap;
    }
    .sub-item:hover, .sub-item.sel { transform:scale(1.3); color:#4ade80; }

    /* ── Name entry ──────────────────────────────────────────────────────────── */
    .name-row { display:flex; gap:8px; align-items:center; }
    .name-row input {
      background:#141428; border:1px solid #3a3a5e; color:#e0e0e0;
      padding:8px 12px; border-radius:6px; font-size:0.88rem;
      outline:none; width:148px; letter-spacing:0.04em; font-family:inherit;
      transition:border-color 0.12s;
    }
    .name-row input:focus { border-color:#4ade80; }
    .name-row button {
      background:#4ade80; color:#0f0f1a; border:none; border-radius:6px;
      padding:8px 16px; font-weight:800; cursor:pointer; font-size:0.85rem;
      font-family:inherit; letter-spacing:0.06em; transition:background 0.12s;
    }
    .name-row button:hover { background:#86efac; }

    /* ── Leaderboard ─────────────────────────────────────────────────────────── */
    .lb-tabs { display:flex; gap:20px; }
    .lb-tab {
      font-size:0.72rem; font-weight:700; letter-spacing:0.16em;
      text-transform:uppercase; color:#303050; cursor:pointer;
      padding:4px 0; border-bottom:2px solid transparent;
      transition:color 0.12s, border-color 0.12s;
    }
    .lb-tab:hover { color:#6060a0; }
    .lb-tab.lb-active { color:#4ade80; border-bottom-color:#4ade80; }
    .lb-table { width:280px; border-collapse:collapse; font-size:0.82rem; }
    .lb-table td { padding:7px 6px; color:#666; }
    .lb-table tr:nth-child(odd) td { background:rgba(255,255,255,0.025); }
    .lb-rank  { color:#383858 !important; width:2em; text-align:right; padding-right:12px !important; }
    .lb-score { color:#4ade80 !important; text-align:right; font-weight:700; }
    .lb-empty { text-align:center; color:#2a2a44; font-size:0.76rem; letter-spacing:0.12em; text-transform:uppercase; }

    /* ── Guide ───────────────────────────────────────────────────────────────── */
    .guide-scroll {
      max-width:330px; max-height:72vh; overflow-y:auto;
      display:flex; flex-direction:column; gap:16px;
      scrollbar-width:thin; scrollbar-color:#222 transparent; padding-right:4px;
    }
    .guide-h { font-size:0.65rem; letter-spacing:0.24em; text-transform:uppercase; color:#4ade80; }
    .guide-block { display:flex; flex-direction:column; gap:5px; font-size:0.78rem; color:#555; line-height:1.65; }
    .guide-block b { color:#888; }
    .guide-fi { display:inline-block; width:1.4em; text-align:center; }

    /* ── Speed level badges in leaderboard ───────────────────────────────────── */
    .lb-lv { font-size:0.58rem; font-weight:700; letter-spacing:0.07em;
             vertical-align:middle; margin-left:5px; }
    .lb-lv-beginner { color:#67e8f9; }
    .lb-lv-normal   { color:#383858; }
    .lb-lv-pro      { color:#f97316; }

    /* ── Extra life / Ad ────────────────────────────────────────────────────── */
    .mi-adlife       { color:#f5a623; }
    .mi-adlife:hover { color:#ffc85e; }
    .ad-panel {
      width:min(400px,88vw); background:#06060f;
      border:1px solid #1e1e38; border-radius:8px;
      overflow:hidden; box-shadow:0 16px 64px rgba(0,0,0,0.85);
    }
    .ad-video {
      width:100%; aspect-ratio:16/9; background:#0b0b1c;
      position:relative; display:flex; align-items:center; justify-content:center;
    }
    .ad-play-icon { font-size:3rem; color:#181830; }
    .ad-badge {
      position:absolute; top:9px; left:9px;
      background:#f5a623; color:#000; font-size:0.48rem; font-weight:900;
      padding:2px 7px; border-radius:2px; letter-spacing:0.14em;
    }
    .ad-tagline {
      position:absolute; font-size:0.65rem; letter-spacing:0.16em;
      color:#14142a; text-transform:uppercase;
    }
    .ad-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px; background:#040409; gap:12px;
    }
    .ad-msg { font-size:0.57rem; color:#2a2a48; letter-spacing:0.07em; flex:1; }
    #ad-skip-btn {
      font-size:0.6rem; letter-spacing:0.1em; color:#2a2a48;
      cursor:default; padding:5px 12px;
      border:1px solid #151528; border-radius:3px; white-space:nowrap;
      transition:color 0.25s, border-color 0.25s, background 0.25s;
    }
    #ad-skip-btn.ready {
      color:#a8a8cc; border-color:#48486a; cursor:pointer;
    }
    #ad-skip-btn.ready:hover { color:#d0d0f0; border-color:#7070a0; background:#0f0f22; }

    /* ── Quest ───────────────────────────────────────────────────────────────── */
    .fx-quest  { background:#3b0764; color:#c4b5fd; border-color:#7c3aed; }
    .opt-toggle {
      display:flex; flex-direction:column; align-items:center; gap:3px; line-height:1;
    }
    .opt-toggle-badge {
      font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase;
    }

    /* ── Canvas shake ────────────────────────────────────────────────────────── */
    @keyframes canvasShake {
      0%,100% { transform:translate(0,0) rotate(0deg); }
      12%     { transform:translate(-6px, 3px) rotate(-0.5deg); }
      25%     { transform:translate(6px, -3px) rotate(0.5deg); }
      37%     { transform:translate(-5px, -3px) rotate(-0.4deg); }
      50%     { transform:translate(5px, 3px) rotate(0.4deg); }
      62%     { transform:translate(-3px, 2px) rotate(-0.2deg); }
      75%     { transform:translate(3px, -2px) rotate(0.2deg); }
      87%     { transform:translate(-1px, 1px) rotate(-0.1deg); }
    }
    #canvas-wrap.shake { animation: canvasShake 0.5s ease; }
  </style>
</head>
<body>

<h1>Snake</h1>
<div id="scoreboard">
  Score:&nbsp;<span class="val" id="score">0</span>
  &nbsp;&nbsp;Best:&nbsp;<span class="val" id="best">0</span>
  <span id="mode-badge">Classic</span>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay"></div>
</div>
<div id="status-bar"></div>
<p id="hint">Arrow keys / WASD &nbsp;·&nbsp; Space / P to pause</p>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const COLS = 24, ROWS = 24, CELL = 24;

const FOOD_CFG = {
  normal: { color:'#f87171', glow:'#fca5a530' },
  boost:  { color:'#fbbf24', glow:'#fbbf2430' },
  freeze: { color:'#67e8f9', glow:'#67e8f930' },
  bonus:  { color:'#fde047', glow:'#fde04730' },
  shrink: { color:'#e879f9', glow:'#e879f930' },
  challenge: { color:'#f97316', glow:'#f9731630' },
};

// ── Maze generator ─────────────────────────────────────────────────────────────
function isFullyConnected(wallSet) {
  const free = COLS * ROWS - wallSet.size;
  const visited = new Set();
  const queue = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
  visited.add(`${queue[0][0]},${queue[0][1]}`);
  while (queue.length) {
    const [x, y] = queue.shift();
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = (x+dx+COLS)%COLS, ny = (y+dy+ROWS)%ROWS;
      const k = `${nx},${ny}`;
      if (!visited.has(k) && !wallSet.has(k)) { visited.add(k); queue.push([nx,ny]); }
    }
  }
  return visited.size === free;
}

function generateMazeWalls() {
  const MARGIN   = 2;
  const CLEAR_R  = 5; // Chebyshev radius around spawn that stays wall-free
  const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
  const nearSpawn = (wx, wy) => Math.max(Math.abs(wx-cx), Math.abs(wy-cy)) < CLEAR_R;

  for (let attempt = 0; attempt < 200; attempt++) {
    const walls = [], wallSet = new Set();
    const numSegs = 8 + rand(5); // 8–12 segments

    for (let i = 0; i < numSegs; i++) {
      const horiz = Math.random() < 0.5;
      const len   = 3 + rand(2); // 3–4 cells
      const x = horiz ? MARGIN + rand(COLS - 2*MARGIN - len + 1)
                      : MARGIN + rand(COLS - 2*MARGIN);
      const y = horiz ? MARGIN + rand(ROWS - 2*MARGIN)
                      : MARGIN + rand(ROWS - 2*MARGIN - len + 1);

      const cells = [];
      for (let j = 0; j < len; j++) cells.push(horiz ? [x+j,y] : [x,y+j]);

      // Skip if inside spawn clear zone
      if (cells.some(([wx,wy]) => nearSpawn(wx,wy))) continue;

      // Skip if any cell is orthogonally adjacent to an already-placed wall
      // (keeps segments visually disconnected from each other)
      const touchesExisting = cells.some(([wx,wy]) =>
        [[1,0],[-1,0],[0,1],[0,-1]].some(([dx,dy]) => wallSet.has(`${wx+dx},${wy+dy}`))
      );
      if (touchesExisting) continue;

      cells.forEach(([wx,wy]) => {
        const k = `${wx},${wy}`;
        if (!wallSet.has(k)) { walls.push([wx,wy]); wallSet.add(k); }
      });
    }

    if (isFullyConnected(wallSet)) return { walls, wallSet };
  }
  return { walls: [], wallSet: new Set() }; // fallback: open board
}

// ── Canvas ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// ── DOM refs ───────────────────────────────────────────────────────────────────
const scoreEl   = document.getElementById('score');
const bestEl    = document.getElementById('best');
const modeBadge = document.getElementById('mode-badge');
const overlayEl = document.getElementById('overlay');
const statusBar = document.getElementById('status-bar');

// ── Game state ─────────────────────────────────────────────────────────────────
let mode = 'classic';          // 'classic' | 'maze' | 'chaos'
let selectedMode = 'classic';
let snake, dir, nextDir;
let walls, wallSet;
let normalFood, specialFood;   // normalFood=[x,y]; specialFood={type,x,y,expiresAt}
let score, best;
let effects;                   // { boost: expiryTimestamp, freeze: expiryTimestamp }
let state;                     // 'idle' | 'running' | 'paused' | 'dead'
let loopTimer;
let movesSinceSpecial;

// Refresh food (maze wall-refresh shrink) and trap effect
let refreshFood  = null;  // { type:'shrink', x, y, expiresAt }  — maze only
let challengeEffect = null; // { expiresAt } — grows +5, doubles pts, deducts after 5 s

// Wall transition (maze mode)
let wallAlpha       = 1;
let wallFadePhase   = 'none'; // 'out' | 'in' | 'none'
let wallFadeStart   = 0;
const WALL_FADE_MS  = 600;
let wallTransitioning = false;
let pendingWalls    = null;
let wallRefreshTimer = null;

// Purple Chasing Snake (PCS) — Chaos mode only
let pursuers        = [];    // [{ body:[[x,y],...], dir:[dx,dy] }]
let pcsSpawnTimer   = null;
let pcsMoveLoopTimer = null;
let pcsTriggered    = false; // true once score ≥ 30
const PCS_SPEED_MS  = 125;
const PCS_LENGTH    = 5;
const PCS_MAX       = 2;

// Speed level (persisted)
let speedLevel = localStorage.getItem('snake-speed-level') || 'normal'; // 'beginner'|'normal'|'pro'

// Chaos shrink food (periodic, separate slot)
let chaosShrinkFood  = null;  // { x, y, expiresAt }
let chaosShrinkTimer = null;

// Freeze food (periodic every 20s, all modes — permanent stack debuff)
let freezeFood       = null;  // { x, y, expiresAt }
let freezeFoodTimer  = null;
let freezeStacks     = 0;     // how many freeze foods eaten this session

// Quest system
let questEnabled      = localStorage.getItem('snake-quest') !== 'false'; // default on
let questState        = 'idle';   // 'idle' | 'starter' | 'active'
let questStarterTimer = null;     // setTimeout → spawnQuestStarter
let questStarter      = null;     // { x, y, dir:[dx,dy], expiresAt }
let questObjects      = [];       // [{ num, x, y, dir:[dx,dy], expiresAt }]
let questNextExpected = 1;        // which number must be eaten next
let questMoveTimer    = null;     // fixed-interval move loop (250 ms = 0.5× base speed)

// Extra life (one-time ad revive per game session)
let extraLifeUsed    = false;
let reviveSnapshot   = null;  // snapshot saved before each step
let isReviving       = false; // brief invincibility after revive

// ── Persistence ────────────────────────────────────────────────────────────────
const loadBest = m => parseInt(localStorage.getItem(`snake-best-${m}`) || '0');
const saveBest = (m,v) => localStorage.setItem(`snake-best-${m}`, v);

function loadLB(m) {
  try { return JSON.parse(localStorage.getItem(`snake-lb-${m}`) || '[]'); }
  catch(e) { return []; }
}
function saveLB(m, entries) { localStorage.setItem(`snake-lb-${m}`, JSON.stringify(entries)); }
function isTopTen(m, sc) {
  if (sc <= 0) return false;
  const lb = loadLB(m);
  return lb.length < 10 || sc >= lb[lb.length - 1].score;
}
function addToLB(m, name, sc) {
  const lb = loadLB(m);
  lb.push({ name: (name.trim() || 'Player').substring(0, 16), score: sc, level: speedLevel });
  lb.sort((a, b) => b.score - a.score);
  lb.splice(10);
  saveLB(m, lb);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const rand = n => Math.floor(Math.random() * n);

function occupiedSet(extraCell) {
  const s = new Set(snake.map(([x,y]) => `${x},${y}`));
  if (wallSet) wallSet.forEach(k => s.add(k));
  if (extraCell) s.add(`${extraCell[0]},${extraCell[1]}`);
  return s;
}

function randFreeCell(extraExclude) {
  const occ = occupiedSet(extraExclude);
  let c;
  do { c = [rand(COLS), rand(ROWS)]; } while (occ.has(`${c[0]},${c[1]}`));
  return c;
}

const isBoost = () => Date.now() < effects.boost;

function getIntervalMs() {
  let ms = Math.max(65, 125 - score * 1.5);        // base: score-driven speed
  if (isBoost()) ms = Math.max(45, ms * 0.60);     // boost food: +67% speed
  if (freezeStacks > 0) ms *= Math.pow(1.25, freezeStacks); // each freeze: −20% speed (stacks)
  if (speedLevel === 'beginner') ms = ms / 0.75;
  if (speedLevel === 'pro')      ms = ms / 1.5;
  return Math.round(ms);
}

// ── Init ───────────────────────────────────────────────────────────────────────
function initGame() {
  const mx = Math.floor(COLS/2), my = Math.floor(ROWS/2);
  snake   = [[mx,my],[mx-1,my],[mx-2,my]];
  dir     = [1,0];
  nextDir = [1,0];
  score   = 0;
  scoreEl.textContent = 0;
  best    = loadBest(mode);
  bestEl.textContent  = best;
  effects = { boost:0 };
  movesSinceSpecial   = 0;
  specialFood         = null;

  refreshFood     = null;
  challengeEffect = null;

  clearTimeout(pcsSpawnTimer);    pcsSpawnTimer    = null;
  clearTimeout(pcsMoveLoopTimer); pcsMoveLoopTimer = null;
  pursuers    = [];
  pcsTriggered = false;

  clearTimeout(chaosShrinkTimer); chaosShrinkTimer = null;
  chaosShrinkFood = null;
  clearTimeout(freezeFoodTimer);  freezeFoodTimer  = null;
  freezeFood = null; freezeStacks = 0;

  // Reset quest state
  clearTimeout(questStarterTimer); questStarterTimer = null;
  clearTimeout(questMoveTimer);    questMoveTimer    = null;
  questStarter = null; questObjects = [];
  questState = 'idle'; questNextExpected = 1;

  // Reset extra-life state
  extraLifeUsed  = false;
  reviveSnapshot = null;
  isReviving     = false;

  // Reset wall transition
  clearTimeout(wallRefreshTimer);
  wallAlpha = 1; wallFadePhase = 'none'; wallTransitioning = false; pendingWalls = null;

  if (mode === 'maze') {
    ({ walls, wallSet } = generateMazeWalls());
  } else {
    walls = []; wallSet = null;
  }

  normalFood = randFreeCell(null);
  modeBadge.textContent = { classic:'Classic', maze:'Maze', chaos:'Chaos' }[mode];
}

// ── Quest helpers ──────────────────────────────────────────────────────────────
const QUEST_COLORS = ['#ef4444','#f97316','#eab308','#8b5cf6','#3b82f6'];

function randQuestDir() {
  return [[1,0],[-1,0],[0,1],[0,-1]][rand(4)];
}

function scheduleQuestStarter() {
  clearTimeout(questStarterTimer);
  questStarterTimer = setTimeout(spawnQuestStarter, 30000);
}

function spawnQuestStarter() {
  questStarterTimer = null;
  if (state !== 'running' || !questEnabled) return;
  if (!['classic','chaos'].includes(mode) || score < 30) return;
  if (questState !== 'idle') return;
  const pos = randFreeCell(null);
  questStarter = { x: pos[0], y: pos[1], dir: randQuestDir(), expiresAt: Date.now() + 8000 };
  questState = 'starter';
  startQuestMoveLoop();
}

function spawnQuestObjects() {
  const expiresAt = Date.now() + 15000;
  const placed = [];
  const MIN_DIST = 9;  // Euclidean — keeps objects well spread across the grid
  questObjects = [];
  for (let num = 1; num <= 5; num++) {
    let pos, tries = 0;
    do {
      pos = randFreeCell(null);
      tries++;
    } while (tries < 300 && placed.some(p => {
      const dx = p[0] - pos[0], dy = p[1] - pos[1];
      return Math.sqrt(dx*dx + dy*dy) < MIN_DIST;
    }));
    placed.push(pos);
    questObjects.push({ num, x: pos[0], y: pos[1], dir: randQuestDir(), expiresAt });
  }
  questState = 'active';
  questNextExpected = 1;
  startQuestMoveLoop();
}

function moveQuestObj(obj, isStarter) {
  // 40% chance to freeze this tick
  if (Math.random() < 0.40) return;

  const DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
  let chosenDir = null;

  if (!isStarter && questObjects.length > 1) {
    // Pick the direction that moves furthest from the nearest sibling
    const siblings = questObjects.filter(o => o !== obj);
    let bestDir = null, bestMinDist = -1;
    // Shuffle so ties are broken randomly
    const shuffled = DIRS.slice().sort(() => Math.random() - 0.5);
    for (const d of shuffled) {
      const nx = (obj.x + d[0] + COLS) % COLS;
      const ny = (obj.y + d[1] + ROWS) % ROWS;
      if (wallSet && wallSet.has(`${nx},${ny}`)) continue;
      // Use squared distance (no sqrt needed for comparison)
      let minDist = Infinity;
      for (const s of siblings) {
        const dx = nx - s.x, dy = ny - s.y;
        minDist = Math.min(minDist, dx*dx + dy*dy);
      }
      if (minDist > bestMinDist) { bestMinDist = minDist; bestDir = d; }
    }
    if (bestDir) chosenDir = bestDir;
  }

  // Starter (or solo object): random walk
  if (!chosenDir) {
    if (Math.random() < 0.30) obj.dir = randQuestDir();
    chosenDir = obj.dir;
  }

  let nx = (obj.x + chosenDir[0] + COLS) % COLS;
  let ny = (obj.y + chosenDir[1] + ROWS) % ROWS;
  if (wallSet && wallSet.has(`${nx},${ny}`)) {
    // Wall hit — try a random fallback direction
    const fallback = DIRS[rand(4)];
    nx = (obj.x + fallback[0] + COLS) % COLS;
    ny = (obj.y + fallback[1] + ROWS) % ROWS;
    if (wallSet && wallSet.has(`${nx},${ny}`)) return; // completely blocked
    obj.dir = fallback;
  } else {
    obj.dir = chosenDir;
  }
  obj.x = nx; obj.y = ny;
}

const QUEST_MOVE_MS = 625; // fixed 0.2× base player speed (125 ms)

function startQuestMoveLoop() {
  if (questMoveTimer) return;        // already running
  (function qLoop() {
    if (state !== 'running' || questState === 'idle') {
      questMoveTimer = null; return;
    }
    if (questStarter)  moveQuestObj(questStarter, true);
    for (const obj of questObjects) moveQuestObj(obj, false);
    questMoveTimer = setTimeout(qLoop, QUEST_MOVE_MS);
  })();
}

function drawQuestStarter(x, y, expiresAt) {
  const now = Date.now();
  if (expiresAt - now < 3000 && Math.floor(now / 220) % 2 === 0) return;
  const cx = x*CELL + CELL/2, cy = y*CELL + CELL/2;
  const p = 3;
  ctx.save();
  const g = ctx.createRadialGradient(cx, cy, 1, cx, cy, CELL * 0.9);
  g.addColorStop(0, 'rgba(232,121,249,0.55)'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(x*CELL - CELL, y*CELL - CELL, CELL*3, CELL*3);
  // Diamond body
  ctx.fillStyle = '#7e22ce';
  ctx.beginPath();
  ctx.moveTo(cx, y*CELL + p);
  ctx.lineTo(x*CELL + CELL - p, cy);
  ctx.lineTo(cx, y*CELL + CELL - p);
  ctx.lineTo(x*CELL + p, cy);
  ctx.closePath(); ctx.fill();
  // "!" text
  ctx.fillStyle = '#f0abfc';
  ctx.font = `bold ${Math.round(CELL * 0.6)}px monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('!', cx, cy + 1);
  ctx.restore();
}

function drawQuestObject(obj) {
  const { x, y, num, expiresAt } = obj;
  const now = Date.now();
  if (expiresAt - now < 3000 && Math.floor(now / 220) % 2 === 0) return;
  const color = QUEST_COLORS[num - 1];
  const dimmed = num > questNextExpected; // future objects are dimmed
  const cx = x*CELL + CELL/2, cy = y*CELL + CELL/2;
  const p = 3;
  ctx.save();
  ctx.globalAlpha = dimmed ? 0.38 : 1;
  const g = ctx.createRadialGradient(cx, cy, 1, cx, cy, CELL * 0.85);
  g.addColorStop(0, color + '70'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(x*CELL - CELL, y*CELL - CELL, CELL*3, CELL*3);
  // Rounded-rect body
  roundRect(ctx, x*CELL + p, y*CELL + p, CELL - p*2, CELL - p*2, 4);
  ctx.fillStyle = color + '28'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = num === questNextExpected ? 2 : 1.2;
  roundRect(ctx, x*CELL + p, y*CELL + p, CELL - p*2, CELL - p*2, 4);
  ctx.stroke();
  // Number
  ctx.fillStyle = color;
  ctx.font = `bold ${Math.round(CELL * 0.58)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(String(num), cx, cy + 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── Extra-life helpers ─────────────────────────────────────────────────────────
function saveReviveSnapshot() {
  if (extraLifeUsed) return;
  reviveSnapshot = {
    snake:           snake.map(s => [...s]),
    score,
    dir:             [...dir],
    nextDir:         [...nextDir],
    normalFood:      [...normalFood],
    specialFood:     specialFood     ? {...specialFood}     : null,
    refreshFood:     refreshFood     ? {...refreshFood}     : null,
    chaosShrinkFood: chaosShrinkFood ? {...chaosShrinkFood} : null,
    freezeFood:      freezeFood      ? {...freezeFood}      : null,
    freezeStacks,
    effects:         {...effects},
    challengeEffect: challengeEffect ? {...challengeEffect} : null,
    pursuers:        pursuers.map(p => ({...p, body: p.body.map(b => [...b])})),
    pcsTriggered,
    movesSinceSpecial,
  };
}

function revive() {
  if (!reviveSnapshot) return;
  extraLifeUsed = true;
  const s = reviveSnapshot;
  reviveSnapshot = null;

  snake           = s.snake;
  score           = s.score;
  dir             = s.dir;
  nextDir         = s.nextDir;
  normalFood      = s.normalFood;
  specialFood     = s.specialFood;
  refreshFood     = s.refreshFood;
  chaosShrinkFood = s.chaosShrinkFood;
  freezeFood      = s.freezeFood;
  freezeStacks    = s.freezeStacks;
  effects         = s.effects;
  challengeEffect = s.challengeEffect;
  pursuers        = s.pursuers;
  pcsTriggered    = s.pcsTriggered;
  movesSinceSpecial = s.movesSinceSpecial;

  scoreEl.textContent = score;
  best = loadBest(mode);
  bestEl.textContent  = best;

  // 1.5 s invincibility so the restored position can't instantly re-trigger death
  isReviving = true;
  setTimeout(() => { isReviving = false; }, 1500);

  draw();
  startLoop();
}

// ── Step ───────────────────────────────────────────────────────────────────────
function step() {
  saveReviveSnapshot();

  // Challenge effect: deduct the 5 added segments when timer expires
  if (challengeEffect && Date.now() > challengeEffect.expiresAt) {
    snake = snake.slice(0, Math.max(3, snake.length - 5));
    challengeEffect = null;
  }
  // Refresh-shrink food expiry (maze wall refresh)
  if (refreshFood && Date.now() > refreshFood.expiresAt) refreshFood = null;
  // Chaos periodic shrink expiry
  if (chaosShrinkFood && Date.now() > chaosShrinkFood.expiresAt) chaosShrinkFood = null;
  // Freeze food expiry
  if (freezeFood && Date.now() > freezeFood.expiresAt) freezeFood = null;
  // Quest expiry
  if (questStarter && Date.now() > questStarter.expiresAt) {
    questStarter = null; questState = 'idle';
    if (questEnabled && score >= 30) scheduleQuestStarter();
  }
  if (questObjects.length > 0 && Date.now() > questObjects[0].expiresAt) {
    questObjects = []; questNextExpected = 1; questState = 'idle';
    if (questEnabled && score >= 30) scheduleQuestStarter();
  }

  dir = nextDir.slice();
  const head = [snake[0][0]+dir[0], snake[0][1]+dir[1]];

  head[0] = (head[0] + COLS) % COLS;
  head[1] = (head[1] + ROWS) % ROWS;
  if (!wallTransitioning && wallSet && wallSet.has(`${head[0]},${head[1]}`)) return die();
  for (let i=0; i<snake.length-1; i++)
    if (snake[i][0]===head[0] && snake[i][1]===head[1]) return die();

  snake.unshift(head);

  let grew = false;

  // Player head hits any PCS segment (head or body) → +2 len, +5, PCS removed, shake
  for (let pi = pursuers.length - 1; pi >= 0; pi--) {
    const pcs = pursuers[pi];
    if (pcs.body.some(([bx,by]) => bx===head[0] && by===head[1])) {
      addScore(5);
      const tail = snake[snake.length-1];
      snake.push([...tail], [...tail]);
      pursuers.splice(pi, 1);
      grew = true;
      triggerShake();
    }
  }

  if (head[0]===normalFood[0] && head[1]===normalFood[1]) {
    addScore(1);
    normalFood = randFreeCell(specialFood ? [specialFood.x, specialFood.y] : null);
    grew = true;
  } else if (refreshFood && head[0]===refreshFood.x && head[1]===refreshFood.y) {
    eatRefreshFood(); grew = true;
  } else if (specialFood && head[0]===specialFood.x && head[1]===specialFood.y) {
    eatSpecial(); grew = true;
  } else if (chaosShrinkFood && head[0]===chaosShrinkFood.x && head[1]===chaosShrinkFood.y) {
    addScore(2);
    snake = snake.slice(0, Math.max(3, Math.ceil(snake.length / 2)));
    chaosShrinkFood = null;
    grew = true;
  }
  // Freeze food: permanent −20% speed stack, no growth, no points
  if (freezeFood && head[0]===freezeFood.x && head[1]===freezeFood.y) {
    freezeStacks++;
    freezeFood = null;
  }
  if (!grew) snake.pop();

  // ── Quest collisions ──────────────────────────────────────────────────────────
  if (questState === 'starter' && questStarter &&
      head[0] === questStarter.x && head[1] === questStarter.y) {
    clearTimeout(questStarterTimer); questStarterTimer = null;
    questStarter = null;
    spawnQuestObjects();
  }
  if (questState === 'active' && questObjects.length > 0) {
    for (let qi = 0; qi < questObjects.length; qi++) {
      const qo = questObjects[qi];
      if (head[0] === qo.x && head[1] === qo.y) {
        if (qo.num === questNextExpected) {
          questNextExpected++;
          questObjects.splice(qi, 1);
          if (questNextExpected > 5) {           // All 5 in order — quest complete!
            const pts = challengeEffect ? 20 : 10;
            addScore(pts);
            questObjects = []; questNextExpected = 1; questState = 'idle';
            if (questEnabled && score >= 30) scheduleQuestStarter();
          }
        } else {                                 // Wrong order — quest failed
          questObjects = []; questNextExpected = 1; questState = 'idle';
          if (questEnabled && score >= 30) scheduleQuestStarter();
        }
        break;
      }
    }
  }
  // ── Auto-schedule quest starter when score first crosses 30 ──────────────────
  if (questEnabled && ['classic','chaos'].includes(mode) && score >= 30
      && questState === 'idle' && !questStarterTimer) {
    scheduleQuestStarter();
  }

  // Chaos: manage special food lifecycle
  if (mode === 'chaos') {
    movesSinceSpecial++;
    if (specialFood?.expiresAt && Date.now() > specialFood.expiresAt) specialFood = null;
    if (!specialFood && movesSinceSpecial >= 6 + rand(5)) {
      spawnSpecial(); movesSinceSpecial = 0;
    }
  }

  // Maze: occasionally spawn trap food
  if (mode === 'maze') {
    movesSinceSpecial++;
    if (specialFood?.expiresAt && Date.now() > specialFood.expiresAt) specialFood = null;
    if (!specialFood && movesSinceSpecial >= 15 + rand(10)) {
      spawnMazeChallenge(); movesSinceSpecial = 0;
    }
  }

  draw();
  updateStatusBar();
}

function eatSpecial() {
  const { type } = specialFood;
  if      (type === 'boost')  { addScore(2); effects.boost  = Date.now() + 5000; }
  else if (type === 'bonus')  { addScore(3); }
  else if (type === 'shrink') { addScore(2); snake = snake.slice(0, Math.max(3, Math.ceil(snake.length/2))); }
  else if (type === 'challenge') {
    addScore(1);
    // Grow +4 tail copies (plus the normal +1 from not popping = +5 total)
    const tail = snake[snake.length-1];
    for (let i = 0; i < 4; i++) snake.push([...tail]);
    challengeEffect = { expiresAt: Date.now() + 5000 };
  }
  specialFood = null;
}

function eatRefreshFood() {
  addScore(2);
  snake = snake.slice(0, Math.max(3, Math.ceil(snake.length / 2)));
  refreshFood = null;
}

function spawnSpecial() {
  const type = ['boost','bonus','challenge'][rand(3)]; // freeze handled by periodic timer
  const expiresAt = type === 'bonus'     ? Date.now() + 7000
                  : type === 'challenge' ? Date.now() + 10000
                  : null;
  const pos = randFreeCell([normalFood[0], normalFood[1]]);
  specialFood = { type, x:pos[0], y:pos[1], expiresAt };
}

function spawnMazeChallenge() {
  const pos = randFreeCell([normalFood[0], normalFood[1]]);
  specialFood = { type:'challenge', x:pos[0], y:pos[1], expiresAt: Date.now() + 10000 };
}

function scheduleFreeze() {
  clearTimeout(freezeFoodTimer);
  freezeFoodTimer = setTimeout(spawnFreezeFood, 20000);
}
function spawnFreezeFood() {
  freezeFoodTimer = null;
  if (state !== 'running') return;
  const pos = randFreeCell(null);
  freezeFood = { x: pos[0], y: pos[1], expiresAt: Date.now() + 8000 };
  scheduleFreeze(); // schedule the next one
}

function scheduleChaosShrink() {
  clearTimeout(chaosShrinkTimer);
  chaosShrinkTimer = setTimeout(spawnChaosShrink, 30000);
}

function spawnChaosShrink() {
  chaosShrinkTimer = null;
  if (state !== 'running' || mode !== 'chaos') return;
  const pos = randFreeCell([normalFood[0], normalFood[1]]);
  chaosShrinkFood = { x: pos[0], y: pos[1], expiresAt: Date.now() + 8000 };
  scheduleChaosShrink(); // schedule the next one
}

function addScore(n) {
  score += challengeEffect ? n * 2 : n;
  scoreEl.textContent = score;
  if (score > best) { best = score; bestEl.textContent = best; saveBest(mode, best); }
  if (mode === 'chaos' && !pcsTriggered && score >= 30) {
    pcsTriggered = true;
    schedulePCSSpawn();
  }
}

// ── Purple Chasing Snake ───────────────────────────────────────────────────────
function schedulePCSSpawn() {
  clearTimeout(pcsSpawnTimer);
  pcsSpawnTimer = setTimeout(spawnPCS, 30000 + rand(10001));
}

function spawnPCS() {
  pcsSpawnTimer = null;
  if (state !== 'running' || mode !== 'chaos') return;
  if (pursuers.length >= PCS_MAX) { schedulePCSSpawn(); return; }
  const [hx, hy] = snake[0];
  let pos = null;
  for (let tries = 0; tries < 200; tries++) {
    const c = [rand(COLS), rand(ROWS)];
    const dx = Math.min(Math.abs(c[0]-hx), COLS-Math.abs(c[0]-hx));
    const dy = Math.min(Math.abs(c[1]-hy), ROWS-Math.abs(c[1]-hy));
    if (dx+dy >= 8) { pos = c; break; }
  }
  if (!pos) pos = [(hx + Math.floor(COLS/2)) % COLS, (hy + Math.floor(ROWS/2)) % ROWS];
  const body = [];
  for (let i = 0; i < PCS_LENGTH; i++) body.push([(pos[0]-i+COLS)%COLS, pos[1]]);
  pursuers.push({ body, dir: [1,0], expiresAt: Date.now() + 30000 });
  startPcsMoveLoop();
  schedulePCSSpawn();
}

function startPcsMoveLoop() {
  if (pcsMoveLoopTimer !== null) return;
  if (state !== 'running' || pursuers.length === 0) return;
  pcsMoveLoopTimer = setTimeout(pcsMoveLoop, PCS_SPEED_MS);
}

function pcsMoveLoop() {
  pcsMoveLoopTimer = null;
  if (state !== 'running') return;
  // Remove expired pursuers
  pursuers = pursuers.filter(p => Date.now() < p.expiresAt);
  if (!pursuers.length) return;
  movePCS();
  if (state === 'running' && pursuers.length > 0) {
    pcsMoveLoopTimer = setTimeout(pcsMoveLoop, PCS_SPEED_MS);
  }
}

function getBestPCSDir(pcs) {
  const [thx, thy] = snake[0];
  const [px, py]   = pcs.body[0];
  const [cdx, cdy] = pcs.dir;
  const validDirs  = [];
  let bestDir = null, bestDist = Infinity;
  for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
    if (dx===-cdx && dy===-cdy) continue;
    const nx = (px+dx+COLS)%COLS, ny = (py+dy+ROWS)%ROWS;
    if (pcs.body.slice(0,-1).some(([bx,by]) => bx===nx && by===ny)) continue;
    validDirs.push([dx,dy]);
    const ddx = Math.min(Math.abs(nx-thx), COLS-Math.abs(nx-thx));
    const ddy = Math.min(Math.abs(ny-thy), ROWS-Math.abs(ny-thy));
    if (ddx+ddy < bestDist) { bestDist = ddx+ddy; bestDir = [dx,dy]; }
  }
  if (!validDirs.length) return pcs.dir;
  // 40% chance to pick a random valid direction (makes PCS less predictable)
  return Math.random() < 0.4 ? validDirs[rand(validDirs.length)] : (bestDir || validDirs[0]);
}

function movePCS() {
  for (const pcs of pursuers) {
    pcs.dir = getBestPCSDir(pcs);
    const [dx, dy] = pcs.dir;
    const [hx, hy] = pcs.body[0];
    pcs.body.unshift([(hx+dx+COLS)%COLS, (hy+dy+ROWS)%ROWS]);
    pcs.body.pop();
  }
  checkPCSCollisions();
}

function checkPCSCollisions() {
  if (state !== 'running') return;
  const [phx, phy] = snake[0];
  for (let i = pursuers.length - 1; i >= 0; i--) {
    const pcs = pursuers[i];
    const [chx, chy] = pcs.body[0];
    // PCS head reaches player head → player wins (head-on = reward)
    if (chx === phx && chy === phy) {
      addScore(5);
      const tail = snake[snake.length-1];
      snake.push([...tail], [...tail]);
      pursuers.splice(i, 1);
      triggerShake();
      continue;
    }
    // PCS head reaches player body → penalise player
    for (let j = 1; j < snake.length; j++) {
      if (snake[j][0] === chx && snake[j][1] === chy) {
        snake = snake.slice(0, Math.max(0, snake.length - 3));
        score = Math.max(0, score - 3);
        scoreEl.textContent = score;
        if (snake.length < 3) return die();
        break;
      }
    }
  }
}

function triggerShake() {
  const wrap = document.getElementById('canvas-wrap');
  wrap.classList.remove('shake');
  void wrap.offsetWidth; // force reflow to restart animation
  wrap.classList.add('shake');
  setTimeout(() => wrap.classList.remove('shake'), 520);
}

function drawPCS() {
  if (!pursuers.length) return;
  const pulse = 0.6 + 0.4 * Math.abs(Math.sin(Date.now() / 400));
  for (const pcs of pursuers) {
    pcs.body.forEach(([bx, by], i) => {
      const cx = bx*CELL+CELL/2, cy = by*CELL+CELL/2;
      const g = ctx.createRadialGradient(cx,cy,1,cx,cy,CELL*0.85);
      g.addColorStop(0, `rgba(168,85,247,${(0.35*pulse).toFixed(2)})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(bx*CELL-4, by*CELL-4, CELL+8, CELL+8);
      const t = 1 - i/pcs.body.length;
      ctx.fillStyle = i===0 ? '#d8b4fe' : lerpColor('#6d28d9','#a855f7',t);
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur  = i===0 ? 10 : 5;
      const pad = i===0 ? 1 : 2;
      roundRect(ctx, bx*CELL+pad, by*CELL+pad, CELL-pad*2, CELL-pad*2, i===0?6:4);
      ctx.fill();
    });
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
    // Eyes on PCS head
    const [hx, hy] = pcs.body[0];
    const hcx = hx*CELL+CELL/2, hcy = hy*CELL+CELL/2;
    const [dx, dy] = pcs.dir;
    const [ex, ey] = [-dy, dx];
    [-1,1].forEach(s => {
      const ox = hcx+dx*5+ex*s*3.5, oy = hcy+dy*5+ey*s*3.5;
      ctx.fillStyle='#1a0030'; ctx.beginPath(); ctx.arc(ox,oy,2.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#f0abfc'; ctx.beginPath(); ctx.arc(ox+dx*0.8,oy+dy*0.8,1.2,0,Math.PI*2); ctx.fill();
    });
  }
}

function die() {
  if (isReviving) return;  // post-revive invincibility window
  clearTimeout(loopTimer);
  clearTimeout(wallRefreshTimer);
  // Snap any in-progress transition to completion
  if (pendingWalls) { walls = pendingWalls.walls; wallSet = pendingWalls.wallSet; pendingWalls = null; }
  wallFadePhase = 'none'; wallTransitioning = false; wallAlpha = 1;
  refreshFood = null; challengeEffect = null;
  clearTimeout(pcsSpawnTimer);    pcsSpawnTimer    = null;
  clearTimeout(pcsMoveLoopTimer); pcsMoveLoopTimer = null;
  pursuers = []; pcsTriggered = false;
  clearTimeout(chaosShrinkTimer); chaosShrinkTimer = null;
  chaosShrinkFood = null;
  clearTimeout(questStarterTimer); questStarterTimer = null;
  clearTimeout(questMoveTimer);    questMoveTimer    = null;
  questStarter = null; questObjects = [];
  questState = 'idle'; questNextExpected = 1;
  clearTimeout(freezeFoodTimer); freezeFoodTimer = null;
  freezeFood = null;
  state = 'dead';
  showOverlay('dead');
}

// ── Loop ───────────────────────────────────────────────────────────────────────
function startLoop() {
  state = 'running';
  overlayEl.classList.remove('full', 'full-dim');
  overlayEl.classList.add('hidden');
  statusBar.innerHTML = '';
  if (mode === 'maze') scheduleWallRefresh();
  if (mode === 'chaos') {
    if (pursuers.length > 0) startPcsMoveLoop();
    if (pcsTriggered && !pcsSpawnTimer && pursuers.length < PCS_MAX) schedulePCSSpawn();
    if (!chaosShrinkFood && !chaosShrinkTimer) scheduleChaosShrink();
  }
  if (!freezeFood && !freezeFoodTimer) scheduleFreeze();
  if (questEnabled && ['classic','chaos'].includes(mode) && score >= 30
      && questState === 'idle' && !questStarterTimer) {
    scheduleQuestStarter();
  }
  if (questState !== 'idle' && !questMoveTimer) startQuestMoveLoop();
  (function tick() {
    if (state !== 'running') return;
    step();
    loopTimer = setTimeout(tick, getIntervalMs());
  })();
}

function scheduleWallRefresh() {
  clearTimeout(wallRefreshTimer);
  wallRefreshTimer = setTimeout(startWallTransition, 20000 + rand(10001));
}

function startWallTransition() {
  if (state !== 'running') return;
  pendingWalls = generateMazeWalls();
  wallTransitioning = true;
  wallFadePhase = 'out';
  wallFadeStart = Date.now();
  // Spawn a blinking shrink food that lasts 7 s during the refresh window
  refreshFood = null;
  const pos = randFreeCell([normalFood[0], normalFood[1]]);
  refreshFood = { type:'shrink', x:pos[0], y:pos[1], expiresAt: Date.now() + 7000 };
  // Drive smooth 60fps animation during the fade
  ;(function rafLoop() {
    if (wallFadePhase === 'none') return;
    draw();
    requestAnimationFrame(rafLoop);
  })();
}

function pauseGame()  {
  if (state!=='running') return;
  clearTimeout(loopTimer);
  clearTimeout(wallRefreshTimer);
  clearTimeout(pcsSpawnTimer);
  clearTimeout(pcsMoveLoopTimer); pcsMoveLoopTimer = null;
  clearTimeout(chaosShrinkTimer);
  clearTimeout(freezeFoodTimer); freezeFoodTimer = null;
  clearTimeout(questStarterTimer); questStarterTimer = null;
  clearTimeout(questMoveTimer);    questMoveTimer    = null;
  state='paused';
  showOverlay('paused');
}
function resumeGame() { if (state!=='paused')  return; startLoop(); }

// ── Draw ───────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#13132a';
  ctx.lineWidth = 0.5;
  for (let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  // Active-effect board tint
  if (isBoost())  { ctx.fillStyle='rgba(251,191,36,0.04)';  ctx.fillRect(0,0,canvas.width,canvas.height); }

  // Wall fade transition
  if (wallFadePhase !== 'none') {
    const t = Math.min(1, (Date.now() - wallFadeStart) / WALL_FADE_MS);
    if (wallFadePhase === 'out') {
      wallAlpha = 1 - t;
      if (t >= 1) {
        if (pendingWalls) { walls = pendingWalls.walls; wallSet = pendingWalls.wallSet; pendingWalls = null; }
        wallFadePhase = 'in';
        wallFadeStart = Date.now();
      }
    } else {
      wallAlpha = t;
      if (t >= 1) {
        wallAlpha = 1; wallFadePhase = 'none'; wallTransitioning = false;
        scheduleWallRefresh();
      }
    }
  }

  // Walls (drawn with current alpha so fade works)
  if (walls.length && wallAlpha > 0) {
    ctx.globalAlpha = wallAlpha;
    walls.forEach(([wx,wy]) => {
      ctx.fillStyle = '#1c1c38';
      ctx.fillRect(wx*CELL+1, wy*CELL+1, CELL-2, CELL-2);
      ctx.fillStyle = '#2e2e52';
      ctx.fillRect(wx*CELL+1, wy*CELL+1, CELL-2, 2);
      ctx.fillRect(wx*CELL+1, wy*CELL+1, 2, CELL-2);
      ctx.fillStyle = '#0e0e20';
      ctx.fillRect(wx*CELL+1, wy*CELL+CELL-3, CELL-2, 2);
      ctx.fillRect(wx*CELL+CELL-3, wy*CELL+1, 2, CELL-2);
    });
    ctx.globalAlpha = 1;
  }

  // Food
  drawFoodItem(normalFood[0], normalFood[1], 'normal', null);
  if (refreshFood) drawFoodItem(refreshFood.x, refreshFood.y, refreshFood.type, refreshFood.expiresAt, true);
  if (specialFood) drawFoodItem(specialFood.x, specialFood.y, specialFood.type, specialFood.expiresAt);
  if (chaosShrinkFood) drawFoodItem(chaosShrinkFood.x, chaosShrinkFood.y, 'shrink', chaosShrinkFood.expiresAt, false, 3000);
  if (freezeFood)      drawFoodItem(freezeFood.x, freezeFood.y, 'freeze', freezeFood.expiresAt, false, 3000);
  if (questStarter) drawQuestStarter(questStarter.x, questStarter.y, questStarter.expiresAt);
  for (const obj of questObjects) drawQuestObject(obj);

  // Purple Chasing Snake (drawn under player)
  drawPCS();

  // Snake (tail → head for correct layering)
  for (let i=snake.length-1; i>=0; i--) {
    const t = 1 - i/snake.length;
    ctx.fillStyle = i===0 ? '#86efac' : lerpColor('#22c55e','#4ade80',t);
    const pad = i===0 ? 1 : 2;
    roundRect(ctx, snake[i][0]*CELL+pad, snake[i][1]*CELL+pad, CELL-pad*2, CELL-pad*2, i===0?6:4);
    ctx.fill();
  }

  if (state==='running' || state==='paused') drawEyes();
}

function drawFoodItem(fx, fy, type, expiresAt, alwaysBlink = false, blinkMs = 2500) {
  const cfg = FOOD_CFG[type];
  const cx = fx*CELL+CELL/2, cy = fy*CELL+CELL/2;
  const p  = 4;

  // Radial glow
  const g = ctx.createRadialGradient(cx,cy,1,cx,cy,CELL*0.9);
  g.addColorStop(0, cfg.glow); g.addColorStop(1,'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(fx*CELL-CELL, fy*CELL-CELL, CELL*3, CELL*3);

  // alwaysBlink = constant blink (refresh shrink); else blink only in last 2.5 s
  let alpha = 1;
  if (alwaysBlink || (expiresAt && expiresAt - Date.now() < blinkMs)) {
    alpha = 0.35 + 0.65 * Math.abs(Math.sin(Date.now() / 130));
  }
  ctx.globalAlpha = alpha;
  ctx.fillStyle = cfg.color;

  if (type === 'normal') {
    roundRect(ctx, fx*CELL+p, fy*CELL+p, CELL-p*2, CELL-p*2, 4);
    ctx.fill();
  } else if (type === 'boost') {
    // Up-pointing triangle
    ctx.beginPath();
    ctx.moveTo(cx, fy*CELL+p);
    ctx.lineTo(fx*CELL+CELL-p, fy*CELL+CELL-p);
    ctx.lineTo(fx*CELL+p, fy*CELL+CELL-p);
    ctx.closePath(); ctx.fill();
  } else if (type === 'freeze') {
    // Diamond
    ctx.beginPath();
    ctx.moveTo(cx, fy*CELL+p);
    ctx.lineTo(fx*CELL+CELL-p, cy);
    ctx.lineTo(cx, fy*CELL+CELL-p);
    ctx.lineTo(fx*CELL+p, cy);
    ctx.closePath(); ctx.fill();
  } else if (type === 'bonus') {
    // Circle with dot
    ctx.beginPath(); ctx.arc(cx,cy,CELL/2-p,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0f0f1a'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=cfg.color; ctx.beginPath(); ctx.arc(cx,cy,1.5,0,Math.PI*2); ctx.fill();
  } else if (type === 'shrink') {
    // Down-pointing triangle
    ctx.beginPath();
    ctx.moveTo(cx, fy*CELL+CELL-p);
    ctx.lineTo(fx*CELL+CELL-p, fy*CELL+p);
    ctx.lineTo(fx*CELL+p, fy*CELL+p);
    ctx.closePath(); ctx.fill();
  } else if (type === 'challenge') {
    // Plus/cross shape — orange challenge icon
    const bw = 3;
    roundRect(ctx, fx*CELL+p,  cy-bw, CELL-p*2, bw*2, 2); ctx.fill(); // horizontal bar
    roundRect(ctx, cx-bw, fy*CELL+p,  bw*2, CELL-p*2, 2); ctx.fill(); // vertical bar
  }
  ctx.globalAlpha = 1;
}

function drawEyes() {
  const [hx,hy] = snake[0];
  const cx=hx*CELL+CELL/2, cy=hy*CELL+CELL/2;
  const [dx,dy] = dir;
  const [px,py] = [-dy, dx];
  [-1,1].forEach(s => {
    const ox=cx+dx*5+px*s*3.5, oy=cy+dy*5+py*s*3.5;
    ctx.fillStyle='#0f0f1a'; ctx.beginPath(); ctx.arc(ox,oy,2.8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';    ctx.beginPath(); ctx.arc(ox+dx*0.8,oy+dy*0.8,1.2,0,Math.PI*2); ctx.fill();
  });
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function lerpColor(a,b,t) {
  const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
  const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function updateStatusBar() {
  let html = '';
  if (isBoost())      html += `<div class="fx-chip fx-boost">⚡ Boost <b>${((effects.boost-Date.now())/1000).toFixed(1)}s</b></div>`;
  if (freezeStacks>0) html += `<div class="fx-chip fx-freeze">🧊 ×${freezeStacks} Freeze</div>`;
  if (challengeEffect) html += `<div class="fx-chip fx-challenge">🎯 Challenge <b>${Math.max(0,(challengeEffect.expiresAt-Date.now())/1000).toFixed(1)}s</b></div>`;
  if (questState === 'starter') html += `<div class="fx-chip fx-quest">◆ Quest incoming!</div>`;
  if (questState === 'active')  html += `<div class="fx-chip fx-quest">◆ Quest — eat <b>${questNextExpected}</b></div>`;
  statusBar.innerHTML = html;
}

        skipEl.textContent = `Skip in ${t}`;

  }
}

// ── Input ──────────────────────────────────────────────────────────────────────
const DIR_MAP = {
  ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
  w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
  W:[0,-1], S:[0,1], A:[-1,0], D:[1,0],
};

document.addEventListener('keydown', e => {
  if (e.key==='p' || e.key==='P' || e.key===' ') {
    if (state==='running') pauseGame();
    else if (state==='paused') resumeGame();
    if (e.key===' ') e.preventDefault();
    return;
  }
  if (state !== 'running') return;
  const d = DIR_MAP[e.key];
  if (!d || (d[0]===-dir[0] && d[1]===-dir[1])) return;
  nextDir = d;
  e.preventDefault();
});

let touchX=null, touchY=null;
canvas.addEventListener('touchstart', e => { touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  if (touchX===null || state!=='running') return;
  const dx=e.changedTouches[0].clientX-touchX, dy=e.changedTouches[0].clientY-touchY;
  const d = Math.abs(dx)>Math.abs(dy) ? (dx>0?[1,0]:[-1,0]) : (dy>0?[0,1]:[0,-1]);
  if (!(d[0]===-dir[0] && d[1]===-dir[1])) nextDir=d;
  touchX=touchY=null;
}, {passive:true});

// Click canvas to pause / resume
canvas.addEventListener('click', () => {
  if (state === 'running') pauseGame();
  else if (state === 'paused') resumeGame();
});

// ── Boot ───────────────────────────────────────────────────────────────────────
state      = 'idle';
snake      = [[12,12],[11,12],[10,12]];
dir        = [1,0]; nextDir = [1,0];
walls      = []; wallSet = null;
effects    = { boost:0 };
normalFood = [rand(COLS), rand(ROWS)];
specialFood= null;
score      = 0; best = 0;
ctx.fillStyle = '#0f0f1a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
showOverlay('idle');
</script>
</body>
</html>
